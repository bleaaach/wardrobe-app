<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #FAF8F5; --card: #FFFFFF; --text-primary: #1C1917;
            --text-secondary: #78716C; --accent: #E07A5F; --divider: #E7E5E4;
            --nav-inactive: #A8A29E;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text-primary);
            overflow: hidden; height: 100vh; display: flex;
            justify-content: center; align-items: center; touch-action: manipulation;
        }
        .phone-frame {
            width: 390px; height: 844px; background: var(--bg);
            border-radius: 40px; box-shadow: 0 25px 80px rgba(0,0,0,0.15), 0 0 0 12px #1C1917;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 126px; height: 34px; background: #1C1917; border-radius: 20px; z-index: 100; }
        .status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
        .status-bar .icons { display: flex; gap: 6px; align-items: center; }
        .status-bar .icons svg { width: 18px; height: 18px; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .search-header {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 20px 16px;
        }
        .search-header .back {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: var(--card); display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.04); flex-shrink: 0;
        }
        .search-header .back svg { width: 18px; height: 18px; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .search-box {
            flex: 1; display: flex; align-items: center; gap: 8px;
            background: var(--card); border-radius: 16px; padding: 10px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .search-box svg { width: 18px; height: 18px; stroke: var(--text-secondary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .search-box input {
            flex: 1; border: none; background: transparent; font-size: 15px;
            font-family: 'Inter', sans-serif; color: var(--text-primary); outline: none;
        }
        .search-box input::placeholder { color: var(--nav-inactive); }
        .search-box .clear {
            width: 20px; height: 20px; border-radius: 50%; background: var(--divider);
            border: none; display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: var(--text-secondary); cursor: pointer; flex-shrink: 0;
        }

        .content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 20px; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .filter-chips {
            display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; scrollbar-width: none;
        }
        .filter-chips::-webkit-scrollbar { display: none; }
        .chip {
            padding: 8px 16px; border-radius: 20px; border: 1px solid var(--divider);
            background: transparent; font-family: 'Inter', sans-serif;
            font-size: 13px; font-weight: 500; color: var(--text-secondary);
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .chip.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

        .results-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 16px;
        }
        .results-header h2 {
            font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 3px;
            color: var(--text-secondary);
        }
        .results-header .count { font-size: 13px; color: var(--text-secondary); }

        .result-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 24px; }
        .result-item {
            display: flex; align-items: center; gap: 14px;
            background: var(--card); border-radius: 16px; padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; transition: transform 0.15s;
        }
        .result-item:active { transform: scale(0.98); }
        .result-thumb {
            width: 64px; height: 64px; border-radius: 14px; background: #F5F2EE;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .result-info { flex: 1; min-width: 0; }
        .result-info .name { font-size: 15px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .result-info .meta { font-size: 12px; color: var(--text-secondary); }
        .result-arrow { color: var(--nav-inactive); font-size: 18px; }

        .empty-state {
            text-align: center; padding: 60px 20px;
        }
        .empty-state .empty-icon {
            width: 64px; height: 64px; margin: 0 auto 16px;
            stroke: var(--divider); fill: none; stroke-width: 1.5;
        }
        .empty-state .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .empty-state .empty-desc { font-size: 14px; color: var(--text-secondary); }

        .recent-searches { margin-bottom: 24px; }
        .recent-searches h3 {
            font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 3px;
            color: var(--text-secondary); margin-bottom: 12px;
        }
        .recent-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .recent-tag {
            padding: 8px 14px; border-radius: 20px; background: var(--card);
            border: 1px solid var(--divider); font-size: 13px; color: var(--text-secondary);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="status-bar">
            <span class="time">09:41</span>
            <div class="icons">
                <svg viewBox="0 0 24 24"><path d="M6 10l0 4"/><path d="M10 8l0 8"/><path d="M14 6l0 12"/><path d="M18 9l0 6"/></svg>
                <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/></svg>
                <svg viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/></svg>
            </div>
        </div>

        <div class="search-header">
            <button class="back" onclick="history.back()" aria-label="Back">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="search-box">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" placeholder="Search clothing..." value="linen">
                <button class="clear">&times;</button>
            </div>
        </div>

        <div class="content">
            <div class="filter-chips">
                <button class="chip active">All</button>
                <button class="chip">Tops</button>
                <button class="chip">Bottoms</button>
                <button class="chip">Shoes</button>
                <button class="chip">Dresses</button>
                <button class="chip">Favorites</button>
            </div>

            <div class="results-header">
                <h2>Results</h2>
                <span class="count">3 items</span>
            </div>

            <div class="result-list">
                <div class="result-item">
                    <div class="result-thumb">TO</div>
                    <div class="result-info">
                        <div class="name">White Linen Shirt</div>
                        <div class="meta">Tops &middot; Uniqlo &middot; White</div>
                    </div>
                    <span class="result-arrow">&#8250;</span>
                </div>
                <div class="result-item">
                    <div class="result-thumb">TO</div>
                    <div class="result-info">
                        <div class="name">Beige Linen Blazer</div>
                        <div class="meta">Outerwear &middot; Zara &middot; Beige</div>
                    </div>
                    <span class="result-arrow">&#8250;</span>
                </div>
                <div class="result-item">
                    <div class="result-thumb">BT</div>
                    <div class="result-info">
                        <div class="name">Linen Wide Pants</div>
                        <div class="meta">Bottoms &middot; H&M &middot; Cream</div>
                    </div>
                    <span class="result-arrow">&#8250;</span>
                </div>
            </div>

            <div class="recent-searches">
                <h3>Recent Searches</h3>
                <div class="recent-tags">
                    <span class="recent-tag">white</span>
                    <span class="recent-tag">summer</span>
                    <span class="recent-tag">Uniqlo</span>
                    <span class="recent-tag">dress</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
