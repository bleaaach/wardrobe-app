<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Calendar Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #FAF8F5; --card: #FFFFFF; --text-primary: #1C1917;
            --text-secondary: #78716C; --accent: #E07A5F; --divider: #E7E5E4;
            --nav-inactive: #A8A29E;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text-primary);
            overflow: hidden; height: 100vh; display: flex;
            justify-content: center; align-items: center; touch-action: manipulation;
        }
        .phone-frame {
            width: 390px; height: 844px; background: var(--bg);
            border-radius: 40px; box-shadow: 0 25px 80px rgba(0,0,0,0.15), 0 0 0 12px #1C1917;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 126px; height: 34px; background: #1C1917; border-radius: 20px; z-index: 100; }
        .status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
        .status-bar .icons { display: flex; gap: 6px; align-items: center; }
        .status-bar .icons svg { width: 18px; height: 18px; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .nav-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 20px 16px;
        }
        .nav-header .back {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: var(--card); display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .nav-header .back svg { width: 18px; height: 18px; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-header .date-label {
            font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; font-weight: 600;
        }
        .nav-header .save {
            padding: 8px 18px; border-radius: 20px; border: none;
            background: var(--text-primary); color: #fff; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif;
        }

        .content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 20px; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .log-options {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;
        }
        .log-option {
            background: var(--card); border-radius: 16px; padding: 20px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-align: center;
            cursor: pointer; transition: all 0.15s; border: 2px solid transparent;
        }
        .log-option:active { transform: scale(0.97); }
        .log-option.selected { border-color: var(--text-primary); }
        .log-option .opt-icon {
            width: 40px; height: 40px; margin: 0 auto 10px;
            stroke: var(--text-primary); fill: none; stroke-width: 1.5;
            stroke-linecap: round; stroke-linejoin: round;
        }
        .log-option .opt-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .log-option .opt-desc { font-size: 12px; color: var(--text-secondary); }

        .section-title {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 16px;
        }
        .section-title h2 {
            font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 3px;
            color: var(--text-secondary);
        }
        .section-title .count { font-size: 13px; color: var(--text-secondary); }

        .outfit-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 12px; }
        .outfit-row {
            display: flex; align-items: center; gap: 12px;
            background: var(--card); border-radius: 16px; padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; transition: all 0.15s;
            border: 2px solid transparent;
        }
        .outfit-row:active { transform: scale(0.98); }
        .outfit-row.selected { border-color: var(--text-primary); }
        .outfit-row .thumb {
            width: 56px; height: 56px; border-radius: 12px; background: #F5F2EE;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .outfit-row .info { flex: 1; }
        .outfit-row .info .name { font-size: 15px; font-weight: 600; }
        .outfit-row .info .meta { font-size: 12px; color: var(--text-secondary); }
        .outfit-row .check {
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--text-primary); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }

        .photo-log {
            background: var(--card); border-radius: 20px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); text-align: center;
            margin-bottom: 24px; border: 2px dashed var(--divider); cursor: pointer;
        }
        .photo-log:active { transform: scale(0.98); }
        .photo-log .camera-icon {
            width: 40px; height: 40px; stroke: var(--text-secondary); fill: none;
            stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 8px;
        }
        .photo-log .hint { font-size: 14px; color: var(--text-secondary); }

        .bottom-bar {
            padding: 12px 20px 28px;
        }
        .log-btn {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            background: var(--text-primary); color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: transform 0.15s;
        }
        .log-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="status-bar">
            <span class="time">09:41</span>
            <div class="icons">
                <svg viewBox="0 0 24 24"><path d="M6 10l0 4"/><path d="M10 8l0 8"/><path d="M14 6l0 12"/><path d="M18 9l0 6"/></svg>
                <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/></svg>
                <svg viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/></svg>
            </div>
        </div>

        <div class="nav-header">
            <button class="back" onclick="history.back()" aria-label="Back">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <div class="date-label">Monday, May 18</div>
            <button class="save">Save</button>
        </div>

        <div class="content">
            <div class="log-options">
                <div class="log-option selected">
                    <svg class="opt-icon" viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                    <div class="opt-name">From Outfit</div>
                    <div class="opt-desc">Pick a saved combo</div>
                </div>
                <div class="log-option">
                    <svg class="opt-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    <div class="opt-name">From Closet</div>
                    <div class="opt-desc">Select items</div>
                </div>
                <div class="log-option">
                    <svg class="opt-icon" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    <div class="opt-name">Take Photo</div>
                    <div class="opt-desc">Capture outfit</div>
                </div>
                <div class="log-option">
                    <svg class="opt-icon" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
                    <div class="opt-name">Copy Yesterday</div>
                    <div class="opt-desc">Duplicate last entry</div>
                </div>
            </div>

            <div class="section-title">
                <h2>Choose Outfit</h2>
                <span class="count">12 sets</span>
            </div>

            <div class="outfit-list">
                <div class="outfit-row selected">
                    <div class="thumb" style="background:#F5F2EE;">SF</div>
                    <div class="info">
                        <div class="name">Summer Casual</div>
                        <div class="meta">4 items</div>
                    </div>
                    <div class="check">&#10003;</div>
                </div>
                <div class="outfit-row">
                    <div class="thumb" style="background:#EDE9E4;">WM</div>
                    <div class="info">
                        <div class="name">Work Meeting</div>
                        <div class="meta">4 items</div>
                    </div>
                </div>
                <div class="outfit-row">
                    <div class="thumb" style="background:#F0EEEC;">WD</div>
                    <div class="info">
                        <div class="name">Weekend Date</div>
                        <div class="meta">4 items</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="log-btn">Log Outfit for May 18</button>
        </div>
    </div>
</body>
</html>
