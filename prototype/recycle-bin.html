<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Recycle Bin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #FAF8F5; --card: #FFFFFF; --text-primary: #1C1917;
            --text-secondary: #78716C; --accent: #E07A5F; --divider: #E7E5E4;
            --nav-inactive: #A8A29E;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text-primary);
            overflow: hidden; height: 100vh; display: flex;
            justify-content: center; align-items: center; touch-action: manipulation;
        }
        .phone-frame {
            width: 390px; height: 844px; background: var(--bg);
            border-radius: 40px; box-shadow: 0 25px 80px rgba(0,0,0,0.15), 0 0 0 12px #1C1917;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 126px; height: 34px; background: #1C1917; border-radius: 20px; z-index: 100; }
        .status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
        .status-bar .icons { display: flex; gap: 6px; align-items: center; }
        .status-bar .icons svg { width: 18px; height: 18px; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .nav-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 20px 16px;
        }
        .nav-header .back {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: var(--card); display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .nav-header .back svg { width: 18px; height: 18px; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-header h1 {
            font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; font-weight: 600;
        }
        .nav-header .clear {
            padding: 8px 14px; border-radius: 20px; border: none;
            background: var(--card); color: var(--accent); font-size: 12px; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif; border: 1px solid var(--divider);
        }

        .content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 20px; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .bin-info {
            background: var(--card); border-radius: 16px; padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 20px;
            display: flex; align-items: center; gap: 12px;
        }
        .bin-info .icon {
            width: 40px; height: 40px; border-radius: 12px; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .bin-info .text { flex: 1; }
        .bin-info .text .title { font-size: 15px; font-weight: 600; }
        .bin-info .text .desc { font-size: 12px; color: var(--text-secondary); }

        .section-title {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 16px;
        }
        .section-title h2 {
            font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 3px;
            color: var(--text-secondary);
        }
        .section-title .count { font-size: 13px; color: var(--text-secondary); }

        .deleted-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 24px; }
        .deleted-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--card); border-radius: 16px; padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .deleted-item .thumb {
            width: 56px; height: 56px; border-radius: 14px; background: #F5F2EE;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .deleted-item .info { flex: 1; }
        .deleted-item .info .name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
        .deleted-item .info .meta { font-size: 12px; color: var(--text-secondary); }
        .deleted-item .restore {
            padding: 8px 16px; border-radius: 20px; border: none;
            background: var(--text-primary); color: #fff; font-size: 12px; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif;
        }

        .empty-state {
            text-align: center; padding: 80px 20px;
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .empty-state .empty-desc { font-size: 14px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="status-bar">
            <span class="time">09:41</span>
            <div class="icons">
                <svg viewBox="0 0 24 24"><path d="M6 10l0 4"/><path d="M10 8l0 8"/><path d="M14 6l0 12"/><path d="M18 9l0 6"/></svg>
                <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/></svg>
                <svg viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/></svg>
            </div>
        </div>

        <div class="nav-header">
            <button class="back" onclick="history.back()" aria-label="Back">
                <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <h1>Recycle Bin</h1>
            <button class="clear">Empty All</button>
        </div>

        <div class="content">
            <div class="bin-info">
                <div class="icon">&#9851;</div>
                <div class="text">
                    <div class="title">Auto-delete in 30 days</div>
                    <div class="desc">Items here can be restored before permanent deletion.</div>
                </div>
            </div>

            <div class="section-title">
                <h2>Deleted Items</h2>
                <span class="count">3 items</span>
            </div>

            <div class="deleted-list">
                <div class="deleted-item">
                    <div class="thumb" style="background:#F5F2EE;">TO</div>
                    <div class="info">
                        <div class="name">Striped Polo</div>
                        <div class="meta">Tops &middot; Deleted 2 days ago</div>
                    </div>
                    <button class="restore">Restore</button>
                </div>
                <div class="deleted-item">
                    <div class="thumb" style="background:#EDE9E4;">BT</div>
                    <div class="info">
                        <div class="name">Khaki Chinos</div>
                        <div class="meta">Bottoms &middot; Deleted 5 days ago</div>
                    </div>
                    <button class="restore">Restore</button>
                </div>
                <div class="deleted-item">
                    <div class="thumb" style="background:#F0EEEC;">SH</div>
                    <div class="info">
                        <div class="name">Running Shoes</div>
                        <div class="meta">Shoes &middot; Deleted 1 week ago</div>
                    </div>
                    <button class="restore">Restore</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
