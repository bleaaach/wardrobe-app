<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Outfit Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #FAF8F5; --card: #FFFFFF; --text-primary: #1C1917;
            --text-secondary: #78716C; --accent: #E07A5F; --divider: #E7E5E4;
            --nav-inactive: #A8A29E;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text-primary);
            overflow: hidden; height: 100vh; display: flex;
            justify-content: center; align-items: center; touch-action: manipulation;
        }
        .phone-frame {
            width: 390px; height: 844px; background: var(--bg);
            border-radius: 40px; box-shadow: 0 25px 80px rgba(0,0,0,0.15), 0 0 0 12px #1C1917;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 126px; height: 34px; background: #1C1917; border-radius: 20px; z-index: 100; }
        .status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
        .status-bar .icons { display: flex; gap: 6px; align-items: center; }
        .status-bar .icons svg { width: 18px; height: 18px; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .content { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; position: relative; }
        .content::-webkit-scrollbar { display: none; }

        .hero-overlay {
            position: absolute; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px;
        }
        .hero-overlay button {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .hero-overlay button svg { width: 18px; height: 18px; stroke: var(--text-primary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .hero-overlay .actions { display: flex; gap: 8px; }

        .collage-preview {
            width: 100%; aspect-ratio: 1; background: var(--card);
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 60px 20px 20px;
        }
        .collage-part {
            border-radius: 16px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: var(--text-secondary); letter-spacing: 1px;
        }

        .detail-body { padding: 20px; }

        .detail-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 20px;
        }
        .detail-header .name {
            font-family: 'Playfair Display', serif; font-size: 28px; font-style: italic; font-weight: 600; line-height: 1.2;
        }
        .detail-header .meta {
            font-size: 13px; color: var(--text-secondary); margin-top: 4px;
        }
        .detail-header .wear-btn {
            padding: 10px 20px; border-radius: 20px; border: none;
            background: var(--text-primary); color: #fff; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap;
        }

        .section { margin-bottom: 24px; }
        .section h3 {
            font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 3px;
            color: var(--text-secondary); margin-bottom: 12px;
        }

        .item-list { display: flex; flex-direction: column; gap: 10px; }
        .item-row {
            display: flex; align-items: center; gap: 12px;
            background: var(--card); border-radius: 16px; padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; transition: transform 0.15s;
        }
        .item-row:active { transform: scale(0.98); }
        .item-row .thumb {
            width: 52px; height: 52px; border-radius: 12px; background: #F5F2EE;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .item-row .info { flex: 1; }
        .item-row .info .name { font-size: 15px; font-weight: 600; }
        .item-row .info .cat { font-size: 12px; color: var(--text-secondary); }
        .item-row .arrow { color: var(--nav-inactive); font-size: 18px; }

        .action-row {
            display: flex; gap: 12px; padding: 0 20px 28px;
        }
        .action-row button {
            flex: 1; padding: 14px; border-radius: 16px; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: transform 0.15s;
        }
        .action-row .edit { background: var(--text-primary); color: #fff; }
        .action-row .delete { background: var(--card); color: var(--accent); border: 1px solid var(--divider); }
        .action-row button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="status-bar">
            <span class="time">09:41</span>
            <div class="icons">
                <svg viewBox="0 0 24 24"><path d="M6 10l0 4"/><path d="M10 8l0 8"/><path d="M14 6l0 12"/><path d="M18 9l0 6"/></svg>
                <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/></svg>
                <svg viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2"/><path d="M22 11v2"/></svg>
            </div>
        </div>

        <div class="content">
            <div class="collage-preview">
                <div class="hero-overlay">
                    <button onclick="history.back()" aria-label="Back">
                        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                    </button>
                    <div class="actions">
                        <button aria-label="Edit collage">
                            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button aria-label="More">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                        </button>
                    </div>
                </div>
                <div class="collage-part" style="background:#F5F2EE;">TO</div>
                <div class="collage-part" style="background:#EDE9E4;">BT</div>
                <div class="collage-part" style="background:#F0EEEC;">SH</div>
                <div class="collage-part" style="background:#E7E5E4;">AC</div>
            </div>

            <div class="detail-body">
                <div class="detail-header">
                    <div>
                        <div class="name">Summer Casual</div>
                        <div class="meta">4 items &middot; Created May 2026</div>
                    </div>
                    <button class="wear-btn">Wear Today</button>
                </div>

                <div class="section">
                    <h3>Items in this Outfit</h3>
                    <div class="item-list">
                        <div class="item-row">
                            <div class="thumb" style="background:#F5F2EE;">TO</div>
                            <div class="info">
                                <div class="name">White Linen Shirt</div>
                                <div class="cat">Tops &middot; Shirt</div>
                            </div>
                            <span class="arrow">&#8250;</span>
                        </div>
                        <div class="item-row">
                            <div class="thumb" style="background:#EDE9E4;">BT</div>
                            <div class="info">
                                <div class="name">Wide-leg Trousers</div>
                                <div class="cat">Bottoms &middot; Pants</div>
                            </div>
                            <span class="arrow">&#8250;</span>
                        </div>
                        <div class="item-row">
                            <div class="thumb" style="background:#F0EEEC;">SH</div>
                            <div class="info">
                                <div class="name">Common Projects</div>
                                <div class="cat">Shoes &middot; Sneakers</div>
                            </div>
                            <span class="arrow">&#8250;</span>
                        </div>
                        <div class="item-row">
                            <div class="thumb" style="background:#E7E5E4;">AC</div>
                            <div class="info">
                                <div class="name">Leather Belt</div>
                                <div class="cat">Accessories &middot; Belt</div>
                            </div>
                            <span class="arrow">&#8250;</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-row">
                <button class="edit">Edit Outfit</button>
                <button class="delete">Delete</button>
            </div>
        </div>
    </div>
</body>
</html>
